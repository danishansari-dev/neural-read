<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralRead Popup</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 250px;
            margin: 0;
            padding: 16px;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            font-size: 16px;
            margin: 0 0 16px 0;
            font-weight: 500;
        }
        /* Toggle Switch Styling */
        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }
        .toggle-label {
            font-size: 14px;
            color: #ccc;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 40px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #444;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #ffd166;
        }
        input:checked + .slider:before {
            transform: translateX(16px);
            background-color: #1a1a1a;
        }
        /* For loading and error states */
        .status-message {
            font-size: 12px;
            margin-top: 12px;
            text-align: center;
        }
        .error-message {
            color: #ff6b6b;
            display: none;
        }
        .loading {
            color: #ffd166;
            display: none;
        }
    </style>
</head>
<body>
    <h1>NeuralRead Active</h1>
    
    <div class="toggle-container">
        <span class="toggle-label" id="statusText">Loading...</span>
        <label class="switch">
            <input type="checkbox" id="toggleSwitch" disabled>
            <span class="slider"></span>
        </label>
    </div>
    
    <div id="errorMessage" class="status-message error-message">Error loading status.</div>
    <div id="loadingMessage" class="status-message loading">Saving state...</div>

    <script src="popup.js"></script>
</body>
</html>
