<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>NeuralRead</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #1a1a1a;
      color: #e2e8f0;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 4px;
      color: #ffd166;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .subtitle {
      color: #a0aec0;
      font-size: 12px;
      margin-bottom: 16px;
    }
    p {
      color: #a0aec0;
      font-size: 13px;
      line-height: 1.4;
      margin-bottom: 16px;
    }
    .status-box {
      background: #2d3748;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #cbd5e1;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      background: #334155;
      border: 1px solid #475569;
      color: white;
      border-radius: 4px;
    }
    /* Google OAuth button — white with G logo */
    button.google-btn {
      width: 100%;
      padding: 10px;
      background: #ffffff;
      color: #1a1a1a;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    button.google-btn:hover { opacity: 0.9; }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      color: #64748b;
      font-size: 11px;
    }
    .divider span { white-space: nowrap; }
    .divider::before, .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #334155;
    }

    button.primary {
      width: 100%;
      padding: 10px;
      background: #ffd166;
      color: #111;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      margin-top: 8px;
    }
    button.primary:hover {
      background: #ffdb80;
    }
    button.secondary {
      width: 100%;
      padding: 8px;
      background: transparent;
      color: #a0aec0;
      border: 1px solid #475569;
      border-radius: 4px;
      cursor: pointer;
      margin-top: 8px;
    }
    button.secondary:hover {
      background: #334155;
    }
    .error {
      color: #ff6b6b;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .toggle-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .hint {
      color: #64748b;
      font-size: 11px;
      text-align: center;
      margin-top: 12px;
    }
    
    /* Toggle Switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #475569;
      transition: .4s;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 2px;
      bottom: 2px;
      background-color: white;
      transition: .4s;
    }
    input:checked + .slider {
      background-color: #ffd166;
    }
    input:checked + .slider:before {
      transform: translateX(20px);
    }
    .slider.round {
      border-radius: 20px;
    }
    .slider.round:before {
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <h2>⬡ NeuralRead</h2>
  
  <div class="toggle-row">
    <span>Enable AI Highlights</span>
    <label class="switch">
      <input type="checkbox" id="enabled-toggle" checked>
      <span class="slider round"></span>
    </label>
  </div>

  <!-- Logged-out view: Google + email auth -->
  <div id="auth-view" style="display: none;">
    <!-- Google OAuth opens dashboard login in new tab -->
    <button class="google-btn" id="google-btn">
      <svg width="16" height="16" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><span>or sign in with email</span></div>

    <div id="error-msg" class="error"></div>
    <form id="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" required placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="primary" id="login-btn">Sign In</button>
    </form>
    <div class="hint">New? Use Google sign-in above for instant access</div>
  </div>

  <!-- Logged-in view: status + toggle + signout -->
  <div id="connected-view" style="display: none;">
    <div class="status-box">
      <div style="font-size: 12px; color: #a0aec0; margin-bottom: 4px;">Connected as</div>
      <div id="user-email" style="font-weight: bold; overflow: hidden; text-overflow: ellipsis;">user@example.com</div>
    </div>
    <button id="logout-btn" class="secondary">Sign Out</button>
  </div>

  <!-- Load config.js first (sets global CONFIG), then popup.js -->
  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
