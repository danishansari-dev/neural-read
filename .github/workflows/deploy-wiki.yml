name: Deploy Wiki

on:
  push:
    paths:
      - 'wiki/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout wiki repo
        uses: actions/checkout@v4
        with:
          repository: danishansari-dev/neural-read.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Copy pages and push
        run: |
          cp -r main/wiki/* wiki/
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || git commit -m "docs: Sync wiki from main repo"
          git push